name: annhitra_app
description: "An Nhi Trà - Trà Ngon & Ấm Tử Sa Chính Hãng"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  flutter_widget_from_html_core: ^0.15.2
  photo_view: ^0.15.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.5.3

  # Utilities
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.5.2
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App Icon & Splash Screen generators
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

# ── App Icon Config ──
flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/images/logo_app.png"
  adaptive_icon_background: "#F0ECE4"
  adaptive_icon_foreground: "assets/images/logo_app.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false

# ── Native Splash Screen Config ──
flutter_native_splash:
  color: "#1B322A"
  image: "assets/images/annhi.png"
  color_dark: "#1B322A"
  image_dark: "assets/images/annhi.png"
  ios: true
  android: true
  android_12:
    color: "#1B322A"
    icon_background_color: "#1B322A"
    image: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/font/

  fonts:
    - family: UTMKhuccamta
      fonts:
        - asset: assets/font/UTM Khuccamta.ttf
